<div class="row">
  <div class="col-12 mb-3">
    <button type="button" class="btn btn-primary" (click)="addTrip()">Add Trip</button>
  </div>
</div>

<div class="row" *ngIf="trips && trips.length > 0">
  <div *ngFor="let trip of trips" class="col-md-4 mb-4">
    <app-trip-card [trip]="trip"></app-trip-card>
  </div>
</div>
